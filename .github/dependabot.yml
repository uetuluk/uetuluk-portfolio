version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 6
    groups:
      frontend:
        patterns:
          - "react"
          - "react-*"
          - "@types/react"
          - "@types/react-dom"
          - "lucide-react"
          - "recharts"
      build-and-tooling:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "typescript-eslint"
          - "ts-node"
          - "tsx"
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "prettier"
      cloudflare:
        patterns:
          - "@cloudflare/*"
          - "wrangler"
      styling-and-ui:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
      testing:
        patterns:
          - "@playwright/test"
          - "@testing-library/*"
          - "jsdom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
