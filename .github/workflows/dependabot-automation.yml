name: Dependabot Automation

on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches: [master]
  workflow_run:
    workflows: ["CI", "E2E Tests", "Promptfoo Tests"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: dependabot-automation-${{ github.event.pull_request.number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

jobs:
  approve:
    if: >
      github.event_name == 'pull_request_target' &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Approve Dependabot PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" \
            --approve \
            --body "Approved automatically after repository checks pass."

  merge:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Merge Dependabot PRs with all checks green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr_number="$(gh pr list \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,author \
            --jq '.[] | select(.author.login == "dependabot[bot]") | .number' \
            | head -n 1)"

          if [ -z "$pr_number" ]; then
            echo "No open Dependabot PR found for branch $HEAD_BRANCH"
            exit 0
          fi

          is_draft="$(gh pr view "$pr_number" --json isDraft --jq '.isDraft')"
          if [ "$is_draft" != "false" ]; then
            echo "PR #$pr_number is draft"
            exit 0
          fi

          required_checks_ready="$(gh pr view "$pr_number" --json statusCheckRollup --jq '
            [
              .statusCheckRollup[]
              | select(
                  (.name == "ci" or .name == "e2e" or .name == "prompt-tests") and
                  .status == "COMPLETED" and
                  .conclusion == "SUCCESS"
              )
              | .name
            ] | unique | length
          ')"

          if [ "$required_checks_ready" != "3" ]; then
            echo "PR #$pr_number is still waiting on required checks"
            exit 0
          fi

          failing_checks="$(gh pr view "$pr_number" --json statusCheckRollup --jq '
            [
              .statusCheckRollup[]
              | select(
                  .status != "COMPLETED" or
                  (
                    .conclusion != null and
                    .conclusion != "SUCCESS" and
                    .conclusion != "SKIPPED" and
                    .conclusion != "NEUTRAL"
                  )
                )
            ] | length
          ')"

          if [ "$failing_checks" != "0" ]; then
            echo "PR #$pr_number still has incomplete or failing checks"
            exit 0
          fi

          merge_state="$(gh pr view "$pr_number" --json mergeStateStatus --jq '.mergeStateStatus')"
          case "$merge_state" in
            CLEAN|HAS_HOOKS|UNSTABLE)
              ;;
            *)
              echo "PR #$pr_number is not mergeable yet: $merge_state"
              exit 0
              ;;
          esac

          gh pr merge "$pr_number" --squash --delete-branch

  repair:
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Dependabot PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          pr_number="$(gh pr list \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number,author \
            --jq '.[] | select(.author.login == "dependabot[bot]") | .number' \
            | head -n 1)"

          if [ -z "$pr_number" ]; then
            echo "No open Dependabot PR found for branch $HEAD_BRANCH"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          failing_checks="$(gh pr view "$pr_number" --json statusCheckRollup --jq '
            [
              .statusCheckRollup[]
              | select(
                  (.name == "ci" or .name == "e2e" or .name == "prompt-tests") and
                  (
                    .status != "COMPLETED" or
                    .conclusion == "FAILURE" or
                    .conclusion == "TIMED_OUT" or
                    .conclusion == "CANCELLED" or
                    .conclusion == "ACTION_REQUIRED"
                  )
                )
              | .name
            ] | unique | join(", ")
          ')"

          if [ -z "$failing_checks" ]; then
            echo "No failing required checks remain for PR #$pr_number"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "checks=$failing_checks" >> "$GITHUB_OUTPUT"

      - name: Checkout Dependabot branch
        if: steps.pr.outputs.found == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.pr.outputs.found == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Run Claude repair for failing Dependabot PR
        if: steps.pr.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          FAILING_CHECKS: ${{ steps.pr.outputs.checks }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            You are repairing a failed Dependabot pull request in the repository ${{ github.repository }}.

            Context:
            - Pull request number: ${{ steps.pr.outputs.number }}
            - Branch: ${{ github.event.workflow_run.head_branch }}
            - Workflow that triggered this repair: ${{ github.event.workflow_run.name }}
            - Workflow run URL: ${{ github.event.workflow_run.html_url }}
            - Required checks currently failing or incomplete: ${{ steps.pr.outputs.checks }}

            Task:
            1. Inspect the failing checks and logs with the GitHub CLI.
            2. Make the smallest safe changes needed on the current branch to fix the dependency update.
            3. Run the relevant local verification commands before pushing.
            4. If you fix the problem, commit and push directly to the current branch so CI reruns automatically.
            5. If you cannot fix it confidently, leave a PR comment explaining the blocker and stop without risky edits.

            Constraints:
            - Stay focused on dependency-update fallout only.
            - Do not rewrite unrelated code.
            - Do not downgrade dependencies unless that is the only safe fix and you explain why in the commit or PR comment.
            - If package-lock.json must change, regenerate it with npm install and ensure npm ci succeeds afterward.

            Use gh to inspect the PR and workflow run, and leave a concise PR comment when manual intervention is needed.
          claude_args: '--max-turns 20'
